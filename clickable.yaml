# clickable.yaml
#
# Declares the existing Clickable/CMake build flow for UTGPT and ensures the
# packaged llama.cpp CLI keeps executable permissions when present.
#
clickable_minimum_required: 8.8.0
builder: pure-qml-cmake
kill: qmlscene
postbuild:
  - test -f assets/llama-cli && chmod +x assets/llama-cli
